        function getSignalTypeClass(type) {
            if (type === 'trend_start') return 'trend-start';
            if (type === 'distribution_risk') return 'distribution';
            return 'rebound';
        }

        function getSignalTypeLabel(type) {
            if (type === 'trend_start') return '趋势启动';
            if (type === 'distribution_risk') return '派发风险';
            return '反弹';
        }

        function renderStocks() {
            const passStocks = stockData.filter(s => s.verdict === 'PASS');
            const failStocks = stockData.filter(s => s.verdict === 'FAIL');

            // Render PASS stocks
            document.getElementById('pass-stocks').innerHTML = passStocks.map(stock => `
                <div class="stock-card pass" onclick="showDetail('${stock.code}')">
                    <div class="stock-header">
                        <span class="stock-code">${stock.code}</span>
                        <span class="stock-score pass">${stock.score}</span>
                    </div>
                    <div class="stock-meta">
                        <span class="tag ${getSignalTypeClass(stock.signal_type)}">${getSignalTypeLabel(stock.signal_type)}</span>
                        <span>📊 趋势:${stock.trend_structure} 位置:${stock.price_position}</span>
                    </div>
                    <div class="stock-comment">${stock.comment}</div>
                    <div class="chart-preview">
                        <img src="../data/kline/2026-03-18/${stock.code}_day.jpg" alt="${stock.code} K线图" 
                             onerror="this.style.display='none'; this.parentElement.innerText='📈 K线图加载失败'">
                    </div>
                </div>
            `).join('');

            // Render FAIL stocks
            renderFailStocks(failStocks);
        }

        function renderFailStocks(stocks) {
            document.getElementById('fail-stocks').innerHTML = stocks.map(stock => `
                <div class="stock-card fail" onclick="showDetail('${stock.code}')">
                    <div class="stock-header">
                        <span class="stock-code">${stock.code}</span>
                        <span class="stock-score fail">${stock.score}</span>
                    </div>
                    <div class="stock-meta">
                        <span class="tag ${getSignalTypeClass(stock.signal_type)}">${getSignalTypeLabel(stock.signal_type)}</span>
                        <span>📊 趋势:${stock.trend_structure} 位置:${stock.price_position}</span>
                    </div>
                    <div class="stock-comment">${stock.comment}</div>
                </div>
            `).join('');
        }

        function filterStocks(type) {
            // Update active tab
            document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');

            const failStocks = stockData.filter(s => s.verdict === 'FAIL');
            let filtered = failStocks;
            
            if (type === 'distribution') {
                filtered = failStocks.filter(s => s.signal_type === 'distribution_risk');
            } else if (type === 'rebound') {
                filtered = failStocks.filter(s => s.signal_type === 'rebound');
            }
            
            renderFailStocks(filtered);
        }

        function showDetail(code) {
            const stock = stockData.find(s => s.code === code);
            if (!stock) return;

            document.getElementById('modal-title').innerHTML = `
                <span style="color: ${stock.verdict === 'PASS' ? '#00ff88' : '#ff4757'}">${stock.code}</span>
                <span style="font-size: 0.6em; margin-left: 15px">评分: ${stock.score}</span>
            `;

            document.getElementById('modal-body').innerHTML = `
                <div class="stock-meta" style="margin-bottom: 20px;">
                    <span class="tag ${getSignalTypeClass(stock.signal_type)}">${getSignalTypeLabel(stock.signal_type)}</span>
                    <span class="tag" style="background: ${stock.verdict === 'PASS' ? 'rgba(0,255,136,0.3)' : 'rgba(255,71,87,0.3)'}; 
                                     color: ${stock.verdict === 'PASS' ? '#00ff88' : '#ff4757'}">${stock.verdict}</span>
                </div>
                
                <div class="score-breakdown">
                    <div class="score-item">
                        <div class="score-item-label">趋势结构</div>
                        <div class="score-item-value" style="color: ${stock.trend_structure >= 3 ? '#00ff88' : '#ff4757'}">${stock.trend_structure}/5</div>
                    </div>
                    <div class="score-item">
                        <div class="score-item-label">价格位置</div>
                        <div class="score-item-value" style="color: ${stock.price_position >= 3 ? '#00ff88' : '#ffa502'}">${stock.price_position}/5</div>
                    </div>
                    <div class="score-item">
                        <div class="score-item-label">量价行为</div>
                        <div class="score-item-value" style="color: ${stock.volume_behavior >= 3 ? '#00ff88' : '#ff4757'}">${stock.volume_behavior}/5</div>
                    </div>
                    <div class="score-item">
                        <div class="score-item-label">前期异动</div>
                        <div class="score-item-value" style="color: ${stock.previous_abnormal_move >= 3 ? '#00ff88' : '#ff4757'}">${stock.previous_abnormal_move}/5</div>
                    </div>
                </div>

                ${stock.trend_reasoning ? `
                <div class="reasoning-section">
                    <div class="reasoning-title">📈 趋势分析</div>
                    <div class="reasoning-text">${stock.trend_reasoning}</div>
                </div>
                ` : ''}

                ${stock.position_reasoning ? `
                <div class="reasoning-section">
                    <div class="reasoning-title">📍 位置分析</div>
                    <div class="reasoning-text">${stock.position_reasoning}</div>
                </div>
                ` : ''}

                ${stock.volume_reasoning ? `
                <div class="reasoning-section">
                    <div class="reasoning-title">📊 量价分析</div>
                    <div class="reasoning-text">${stock.volume_reasoning}</div>
                </div>
                ` : ''}

                ${stock.abnormal_move_reasoning ? `
                <div class="reasoning-section">
                    <div class="reasoning-title">⚡ 异动分析</div>
                    <div class="reasoning-text">${stock.abnormal_move_reasoning}</div>
                </div>
                ` : ''}

                ${stock.signal_reasoning ? `
                <div class="reasoning-section">
                    <div class="reasoning-title">🎯 信号综合判断</div>
                    <div class="reasoning-text">${stock.signal_reasoning}</div>
                </div>
                ` : ''}

                <div class="reasoning-section" style="margin-top: 25px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 10px;">
                    <div class="reasoning-title">💡 AI评语</div>
                    <div class="reasoning-text">${stock.comment}</div>
                </div>

                <div class="chart-preview" style="margin-top: 20px; height: 300px;">
                    <img src="../data/kline/2026-03-18/${stock.code}_day.jpg" alt="${stock.code} K线图" 
                         style="max-height: 100%; object-fit: contain;"
                         onerror="this.style.display='none'; this.parentElement.innerText='📈 K线图加载失败'">
                </div>
            `;

            document.getElementById('detail-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.remove('active');
        }

        // Close modal when clicking outside
        document.getElementById('detail-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Initialize
        renderStocks();
    </script>
